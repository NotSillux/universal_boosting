<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boosting</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" class="hidden">
        <aside id="sidebar">
            <div class="brand">
                <div class="brand-mark">◈</div>
                <div class="brand-text">BOOST<span>OS</span></div>
            </div>
            <nav id="nav"></nav>
            <div class="side-profile" id="side-profile"></div>
        </aside>

        <main id="main">
            <header id="topbar">
                <div id="page-title">Dashboard</div>
                <div id="topbar-right">
                    <div id="wallet"></div>
                    <button id="close-btn" title="Close">✕</button>
                </div>
            </header>
            <section id="view"></section>
        </main>

        <div id="toast-host"></div>
        <div id="invite-host"></div>
        <div id="dialog-layer" class="hidden"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
